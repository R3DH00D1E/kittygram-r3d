{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Kittygram</title>
    <link rel="stylesheet" href="{% static 'cats/retro.css' %}">
    <style>
        .auth-container {
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .auth-panel {
            width: 100%;
            max-width: 400px;
        }

        .auth-panel h2 {
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 8px;
            background: linear-gradient(180deg, var(--titlebar-active), var(--titlebar));
            color: var(--title-text);
            border: 1px solid #000000;
            box-shadow:
                inset 1px 1px 0 #ffffff,
                inset -1px -1px 0 #000000;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--window-shadow);
            background: #ffffff;
            font-family: 'MS Sans Serif', Tahoma, Verdana, sans-serif;
            box-shadow:
                inset 1px 1px 0 var(--window-light),
                inset -1px -1px 0 var(--window-dark);
        }

        .form-group input:focus {
            outline: 1px solid var(--accent);
            background: #f0f0f0;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            padding: 0 16px;
            border: 1px solid var(--window-shadow);
            background: linear-gradient(180deg, #f7f7f7, #d6d6d6);
            text-decoration: none;
            color: var(--ink);
            box-shadow:
                inset 1px 1px 0 var(--window-light),
                inset -1px -1px 0 var(--window-dark);
            cursor: pointer;
            font-family: 'MS Sans Serif', Tahoma, Verdana, sans-serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .button:hover {
            background: linear-gradient(180deg, #ffffff, #dcdcdc);
        }

        .button-alt {
            background: linear-gradient(180deg, #f8f8f8, #cfcfcf);
        }

        .error-message {
            color: var(--accent-2);
            margin-bottom: 16px;
            padding: 8px;
            border: 1px solid var(--window-shadow);
            background: #efefef;
            font-size: 0.9rem;
        }

        .link-text {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .link-text a {
            text-decoration: underline;
        }

        .debug-toggle {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 8px 12px;
            border: 1px solid var(--window-shadow);
            background: linear-gradient(180deg, #f7f7f7, #d6d6d6);
            text-decoration: none;
            color: var(--ink);
            box-shadow:
                inset 1px 1px 0 var(--window-light),
                inset -1px -1px 0 var(--window-dark);
            cursor: pointer;
            font-family: 'MS Sans Serif', Tahoma, Verdana, sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .debug-toggle:hover {
            background: linear-gradient(180deg, #ffffff, #dcdcdc);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="panel auth-panel">
            <h2>Вход в Kittygram</h2>

            {% if error %}
                <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="button">Вход</button>
                    <a href="{% url 'register' %}" class="button button-alt">Регистрация</a>
                </div>
            </form>

            <div class="link-text">
                Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a>
            </div>
        </div>
    </div>

    <a href="?debug=1" class="debug-toggle">Debug Menu</a>
</body>
</html>
